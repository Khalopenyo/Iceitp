services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: conf
      POSTGRES_PASSWORD: confpass
      POSTGRES_DB: confdb
    ports:
      - "5434:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conf -d confdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://conf:confpass@db:5432/confdb?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 8080
      GIN_MODE: ${GIN_MODE:-release}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      FILE_STORAGE_ROOT: /app/storage
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  db-data:
