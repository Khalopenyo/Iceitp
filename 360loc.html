<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Панорама</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; }
       #panorama { width: 100%; height: 100vh;}
    </style>
</head>
<body>
    <div id="panorama"></div>

    <script>
        
    pannellum.viewer('panorama', {
    "type": "equirectangular",
    "panorama": "https://raw.githubusercontent.com/ramz777/konficeitp/refs/heads/main/%D0%BF%D1%83%D0%BB%D1%8C%D1%81%D0%B0%D1%80111.jpg",
    "autoLoad": true,
    "hfov": 80,
    "multiRes": false
});
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Панорама</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; }
        #panorama { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="panorama"></div>

    <script>
        pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "https://raw.githubusercontent.com/ramz777/konficeitp/refs/heads/main/%D1%85%D0%B0%D0%B8%CC%86%D0%BF%D0%B0%D1%80%D0%BA111.jpg",
            "autoLoad": true,
            "hfov": 80,
            "hotSpots": [
                {
                    "pitch": -1,   // Вертикальное положение
                    "yaw": -129,     // Горизонтальное положение
                    "type": "info",
                    "text": "Пульсар",
                    "URL": "http://icetp.gstou.ru/pulsar360", // Укажите нужный URL
                    "target": "_self" // Открыть в новой вкладке
                },
                {
                    "pitch": -2,   // Вертикальное положение
                    "yaw": -138,     // Горизонтальное положение
                    "type": "info",
                    "text": "Центр прототипирования",
                    "URL": "http://icetp.gstou.ru/lab360", // Укажите нужный URL
                    "target": "_self" // Открыть в новой вкладке
                },
                {
                    "pitch": -5,
                    "yaw": -275,
                    "type": "info",
                    "text": "Квазар",
                    "URL": "http://icetp.gstou.ru/kvazar360",
                    "target": "_self" // Открыть в текущем окне
                }
            ]
        });
    </script>
</body>
</html>
